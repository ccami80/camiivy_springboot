# Server
server.port=8080

# Spring
spring.application.name=cami_springboot

# 로컬 비밀번호: application-local.properties (gitignore됨)
spring.profiles.include=local

# Database (Supabase PostgreSQL)
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres.bnjynxwikqspvfimtlja
spring.datasource.password=${SUPABASE_DB_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

# Swagger (SpringDoc)
springdoc.api-docs.path=/api-docs
springdoc.api-docs.querydsl.enabled=false
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.groups-order=ASC

# Logging
logging.level.root=INFO
logging.level.com.cami=DEBUG

# ========================================
# 사용자 정의 설정 (app.*)
# ========================================
app.auth.token.access.expiration-seconds=86400
app.auth.token.refresh.expiration-seconds=2592000
app.auth.token.cookie.access-name=accessTokenLeeds
app.auth.token.cookie.refresh-name=refreshTokenLeeds
app.auth.token.secure=false
app.auth.token.domain=

# Admin 로그인 (환경변수로 설정 권장)
app.admin.username=admin@cami-ivy.com
app.admin.password=admin1234

# Kakao OAuth (실제 값으로 교체 필요)
app.kakao.client-id=
app.kakao.client-secret=
app.kakao.token-url=https://kauth.kakao.com/oauth/token
app.kakao.user-info-url=https://kapi.kakao.com/v2/user/me
app.kakao.redirect-uri=

# Google OAuth (실제 값으로 교체 필요)
app.google.client-id=
app.google.client-secret=
app.google.token-url=https://oauth2.googleapis.com/token
app.google.user-info-url=https://www.googleapis.com/oauth2/v2/userinfo
app.google.redirect-uri=

# Supabase Storage (이미지 업로드용, 실제 값으로 교체 필요)
app.supabase.url=https://bnjynxwikqspvfimtlja.supabase.co
app.supabase.anon-key=
app.supabase.storage.public-bucket-name=public
app.supabase.storage.private-bucket-name=private
app.supabase.storage.signed-url-expires-in-seconds=3600
