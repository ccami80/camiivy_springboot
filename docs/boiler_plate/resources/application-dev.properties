# ========================================
# Server Configuration
# ========================================
server.port=8082

# ========================================
# Application Configuration
# ========================================
spring.application.name=platform_springboot

# ========================================
# Database Configuration (참조 방식)
# ========================================
# DB 전환: app.datasource.active 값만 변경하면 됩니다!
# - rds: AWS RDS MySQL 사용
# - supabase: Supabase PostgreSQL 사용
spring.datasource.driver-class-name=${app.datasource.${app.datasource.active}.driver}
spring.datasource.url=${app.datasource.${app.datasource.active}.url}
spring.datasource.username=${app.datasource.${app.datasource.active}.username}
spring.datasource.password=${app.datasource.${app.datasource.active}.password}

# ========================================
# JPA Configuration
# ========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${app.datasource.${app.datasource.active}.dialect}
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

# ========================================
# Swagger Configuration
# ========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.groups-order=ASC

# ========================================
# File Upload Configuration
# ========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================================
# Logging Configuration (기본값)
# ========================================
logging.level.com.culwonder.platform_springboot=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

