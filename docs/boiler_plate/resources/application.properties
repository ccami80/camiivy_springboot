# ========================================
# Active Profile (dev, prod)
# ========================================
spring.profiles.active=dev

# ========================================
# App settings (app.*)
# ========================================
# Auth token: cookie names are generic (override per platform)
app.auth.token.access.expiration-seconds=86400
app.auth.token.refresh.expiration-seconds=2592000
app.auth.token.secure=false
app.auth.token.domain=
app.auth.token.cookie.access-name=accessToken
app.auth.token.cookie.refresh-name=refreshToken